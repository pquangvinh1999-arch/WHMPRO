<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO SHIPPING - BY VINH</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-focus:focus { border-color: #e11d48; box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1); }
        .list-enter-active, .list-leave-active { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(30px); }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col p-4">
    <div class="bg-rose-600 rounded-2xl p-6 text-white shadow-lg mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight">WHMFG PRO</h1>
            <p class="text-[10px] opacity-90 uppercase font-bold tracking-widest">PDA SHIPPING SCAN | {{ currentTime }}</p>
        </div>
        <div class="text-right">
            <p class="text-3xl font-black">{{ queue.length }}</p>
            <p class="text-[10px] uppercase font-semibold opacity-90">Tags chờ xuất</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4 mb-4">
        <div>
            <label class="text-xs font-extrabold text-slate-500 uppercase ml-1 tracking-wider">Quét Tag ID Cần Xuất</label>
            <input v-model="form.tag" ref="tagInput" @keyup.enter="handleScan"
                   class="w-full mt-2 p-5 bg-rose-50 border-2 border-rose-100 rounded-xl text-center text-2xl font-black text-rose-700 outline-none transition-all input-focus placeholder:text-rose-300 placeholder:text-lg placeholder:font-semibold"
                   placeholder="Quét mã vạch tại đây...">
        </div>

        <div class="pt-2">
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="w-full bg-rose-600 text-white py-4 rounded-xl font-bold text-lg shadow-md hover:bg-rose-700 active:scale-95 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                <span v-if="isSyncing" class="animate-spin text-xl">⏳</span>
                {{ isSyncing ? 'ĐANG ĐẨY DỮ LIỆU...' : '🚀 XUẤT KHO...' }}
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-3 px-2 border-b border-slate-200 pb-2">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">Lịch sử quét mới nhất</h3>
            <button @click="clearAll" v-if="queue.length > 0" class="text-[10px] font-bold text-slate-400 hover:text-red-500 transition-colors bg-slate-100 px-2 py-1 rounded">XÓA TẤT CẢ</button>
        </div>
        
        <div class="overflow-y-auto flex-1 space-y-2 pb-10">
            <transition-group name="list">
                <div v-for="item in queueReversed" :key="item.id" 
                     class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center">
                    <div class="space-y-1">
                        <p class="text-lg font-black text-slate-800">{{ item.tag }}</p>
                        <span class="text-slate-400 text-[10px] font-medium font-mono bg-slate-50 px-2 py-0.5 rounded">{{ item.time }}</span>
                    </div>
                    <div class="flex gap-1">
                        <button @click="editItem(item.id)" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        </button>
                        <button @click="deleteItem(item.id)" class="text-rose-400 p-2 hover:bg-rose-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            </transition-group>
            <div v-if="queue.length === 0" class="text-center py-12 text-slate-400 text-sm italic opacity-60">
                Chưa có dữ liệu. Hãy quét Tag ID đầu tiên.
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed, nextTick } = Vue;

    createApp({
        setup() {
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_WHM_Shipping')) || []);
            const form = ref({ tag: '' });
            const isSyncing = ref(false);
            const currentTime = ref('');
            const tagInput = ref(null);

            // Thay bằng Link Web App của anh
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbxP22mfOEB1uIuU_7oaIyIR6YoP5S3Wg2xOcgaj39qB8FxJXplLnAelff0Xc1hJhF8/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const updateTime = () => {
                currentTime.value = new Date().toLocaleTimeString('vi-VN');
            };

            const handleScan = () => {
                const scannedTag = form.value.tag.trim();
                if (!scannedTag) return;

                const isDuplicate = queue.value.some(item => item.tag === scannedTag);
                if (isDuplicate) {
                    alert(`⚠️ CẢNH BÁO: Tag ID [${scannedTag}] đã được quét trước đó!`);
                    form.value.tag = ''; 
                    nextTick(() => tagInput.value.focus());
                    return;
                }

                queue.value.push({
                    id: Date.now(),
                    tag: scannedTag,
                    time: new Date().toLocaleString('vi-VN')
                });

                form.value.tag = ''; 
                saveLocal();
                nextTick(() => tagInput.value.focus());
            };

            const syncCloud = async () => {
                isSyncing.value = true;
                try {
                    const payload = { 
                        action: "shipping", // Gửi hành động xuất kho
                        data: queue.value.map(i => ({
                            tagID: i.tag,
                            thoiGian: i.time 
                        }))
                    };

                    const response = await fetch(CLOUD_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (result.result && result.result.includes("thành công")) {
                        alert("🚀 " + result.result);
                        queue.value = [];
                        saveLocal();
                        nextTick(() => tagInput.value.focus());
                    } else {
                        alert("⚠️ Server báo lỗi: " + (result.result || "Không xác định"));
                    }
                } catch (e) {
                    alert("❌ Lỗi kết nối Cloud: " + e.message);
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => localStorage.setItem('Vinh_WHM_Shipping', JSON.stringify(queue.value));
            const deleteItem = (id) => { queue.value = queue.value.filter(i => i.id !== id); saveLocal(); };
            const editItem = (id) => {
                const item = queue.value.find(i => i.id === id);
                const newVal = prompt("Sửa lại Tag ID:", item.tag);
                if (newVal) {
                    const checkNewVal = queue.value.some(i => i.tag === newVal.trim() && i.id !== id);
                    if(checkNewVal) { alert("Mã này đã tồn tại!"); return; }
                    item.tag = newVal.trim(); 
                    saveLocal(); 
                }
            };
            const clearAll = () => { if(confirm('Xóa hết hàng chờ xuất?')) { queue.value = []; saveLocal(); }};

            onMounted(() => {
                updateTime();
                setInterval(updateTime, 1000);
                tagInput.value.focus();
            });

            return { queue, form, queueReversed, isSyncing, currentTime, tagInput, handleScan, syncCloud, deleteItem, editItem, clearAll };
        }
    }).mount('#app');
</script>
</body>
</html>
